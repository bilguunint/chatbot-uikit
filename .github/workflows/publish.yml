name: Publish sondor-ui to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "dist-tag (e.g. latest, next, beta)"
        required: false
        default: "latest"

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    # Required for npm Trusted Publishing (OIDC)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sondor-ui
        run: pnpm --filter sondor-ui build

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/ui
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to npm (with provenance)
        working-directory: packages/ui
        run: npm publish --provenance --access public --tag ${{ github.event.inputs.tag || 'latest' }}
